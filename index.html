<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do List | RGS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/dfd1ce1180.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="top-title">
        <h1>To-do List | RGS</h1>
        <h3>Projeto de To-do List criado para aprendizado pessoal :)</h3>
    </div>

    <div id="main_container">

        <div class="top-bar">
            <label for="input-tarefa" class="sr-only">Nova tarefa</label>
            <input
                type="text"
                id="input-tarefa"
                class="input-bar"
                placeholder="Digite aqui"
                aria-label="Digite uma nova tarefa"
                autocomplete="off"
            >
            <button class="main-btn" aria-label="Adicionar tarefa">
                Adicionar
            </button>
        </div>


        <p id="msg-erro" class="msg-erro">Essa tarefa já existe na sua lista!</p>


        <div class="content">
            <div class="empty-state" id="empty-state" aria-live="polite">
                <i class="fa-regular fa-clipboard" aria-hidden="true"></i>
                <p>Sua lista está vazia.<br>Adicione uma tarefa acima!</p>
            </div>

            <ul id="todo-list" aria-label="Lista de tarefas" aria-live="polite"></ul>
        </div>

    </div>

    <footer>
        <h4>Rafael Silva ©</h4>
        <a href="https://www.linkedin.com/in/rafaelgsilva2" target="_blank" rel="noopener">Linkedin</a>
        <a href="https://github.com/Rafaelgs2" target="_blank" rel="noopener">Github</a>
    </footer>

    <script src="scripts.js"></script>

</body>
</html>
